name: Seed Database

on:
  workflow_dispatch:

concurrency:
  group: db-seed
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud-sql-proxy \
            ${{ secrets.GCP_PROJECT_ID }}:${{ vars.GCP_REGION }}:cinematch-db \
            --port 5432 &
          sleep 5

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Seed database
        env:
          PGPASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
        run: |
          sed \
            -e '/^\\restrict/d' \
            -e '/^SET transaction_timeout/d' \
            -e '/OWNER TO postgres;/d' \
            src/postgresql/ml_movies_small.sql | \
          psql \
            --host=127.0.0.1 \
            --port=5432 \
            --username=${{ vars.CLOUD_SQL_USER }} \
            --dbname=cinematch
