name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            python: "3.10"
          - service: frontend
            python: "3.10"
          - service: model-service
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install ruff
        run: pip install ruff
      - name: Lint ${{ matrix.service }}
        run: ruff check src/${{ matrix.service }}/

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t cinematch-backend src/backend/

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -t cinematch-frontend src/frontend/

  build-model-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build model-service image
        uses: docker/build-push-action@v5
        with:
          context: src/model-service/
          push: false
          build-args: MODEL_SERVICE_EXTRA=cpu
          tags: cinematch-model-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
